name: Build Bugscraper
on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated list of tags to apply (e.g., "demo,debug")'
        required: false
        default: ''

env:
  TAGS: ${{ github.event.inputs.tags || '' }}
  VENV_PATH: /tmp/makelove/venv
  EXPORT_DIR: _export
  STEAM_DIR: _export/steam

jobs:
  build-packages:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Apply tag-based patches
        run: |
          chmod +x _tools/patch_tags.sh
          ./_tools/patch_tags.sh "$TAGS" || exit 1

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            git python3 python3-pip wine squashfs-tools desktop-file-utils \
            libglib2.0-dev libgpgme-dev libgcrypt20-dev libfuse2 libcurl4-openssl-dev \
            xserver-xorg-video-dummy

      - name: Setup Python and install makelove
        run: |
          python3 -m venv '${{ env.VENV_PATH }}'
          source '${{ env.VENV_PATH }}/bin/activate'
          pip install --upgrade pip
          # Install the latest version with auto-download support
          pip install git+https://github.com/alexis-belmonte/makelove

      - name: Build all platforms
        run: |
          export DISPLAY=:87
          sudo X ${DISPLAY} &
          wineboot
          
          source '${{ env.VENV_PATH }}/bin/activate'
          makelove win64 macos appimage

      - name: Create Steam packages
        run: |
          mkdir -p '${{ env.STEAM_DIR }}/'{win64,macos,linux}
          unzip '${{ env.EXPORT_DIR }}/win64/'*.zip -d '${{ env.STEAM_DIR }}/win64'
          unzip '${{ env.EXPORT_DIR }}/macos/'*.zip -d '${{ env.STEAM_DIR }}/macos'
          cp '${{ env.EXPORT_DIR }}/appimage/'*.AppImage '${{ env.STEAM_DIR }}/linux/bugscraper.AppImage'

          cat <<EOF >"${{ env.STEAM_DIR }}/linux/bugscraper.sh"
          #!/bin/bash
          # Bugscraper launcher script for Steam
          # Also take a look at https://yolwoocle.com/soba

          working_directory="\$(dirname "\$(realpath "$0")")"

          export APPIMAGE_EXTRACT_AND_RUN=1
          export LD_LIBRARY_PATH="$\{LD_LIBRARY_PATH}:${working_directory}/squashfs-root"
          "\${working_directory}/bugscraper.AppImage" $@
          EOF
          chmod +x "${{ env.STEAM_DIR }}/linux/bugscraper.sh"

      - name: Upload platform-specific package artefact bundle for the next job
        uses: actions/upload-artifact@v6
        with:
          name: bugscraper-packages-pack
          path: ${{ env.EXPORT_DIR }}
          retention-days: 1
 
  export-artifacts:
    runs-on: ubuntu-24.04

    needs: build-packages

    strategy:
      matrix:
        platform: [appimage, love, macos, steam, win64]

    steps:
      - name: Download intermediate artifact
        uses: actions/download-artifact@v8
        with:
          name: bugscraper-packages-pack
 
      - name: Upload ${{ matrix.platform }} as separate artifact
        uses: actions/upload-artifact@v6
        with:
          name: bugscraper-export-${{ matrix.platform }}
          path: ${{ matrix.platform }}
          if-no-files-found: error

  cleanup:
    runs-on: ubuntu-24.04

    needs: export-artifacts

    steps:
      - name: Delete Artifact
        uses: geekyeggo/delete-artifact@v6
        with:
          name: bugscraper-packages-pack
